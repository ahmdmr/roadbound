<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Roadbound</title>
<style>
  :root{
    --asphalt:#1c1f1d;
    --cream:#f3efe6;
    --rust:#c1571f;
    --moss:#4c5d44;
    --line:#d8d2c2;
    --display: "Georgia", "Times New Roman", serif;
    --body: "Helvetica Neue", Arial, sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--cream);
    color:var(--asphalt);
    font-family:var(--body);
    padding:6vw 8vw;
  }
  .eyebrow{
    letter-spacing:0.25em;
    text-transform:uppercase;
    font-size:0.75rem;
    color:var(--moss);
    margin-bottom:0.8rem;
    font-weight:600;
  }
  h1{
    font-family:var(--display);
    font-size:clamp(2.2rem, 5vw, 3.2rem);
    margin-bottom:2.5rem;
    border-bottom:2px solid var(--asphalt);
    padding-bottom:1.2rem;
  }
  #admin-panel{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));
    gap:1.2rem;
    max-width:1100px;
  }
  .admin-card{
    background:#fff;
    border:1px solid var(--line);
    padding:1.4rem 1.6rem;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:1rem;
    transition: box-shadow 0.2s ease;
  }
  .admin-card:hover{
    box-shadow: 0 10px 24px -10px rgba(28,31,29,0.2);
  }
  .car-info h3{
    font-family:var(--display);
    font-size:1.15rem;
    margin-bottom:0.4rem;
  }
  .status-tag{
    display:inline-block;
    font-size:0.7rem;
    letter-spacing:0.05em;
    text-transform:uppercase;
    font-weight:700;
    padding:0.25rem 0.6rem;
    border-radius:2px;
    color:#fff;
  }
  .status-tag.available{ background:var(--moss); }
  .status-tag.booked{ background:#9a3324; }
  button.toggle-btn{
    background:var(--asphalt);
    color:var(--cream);
    border:none;
    padding:0.7rem 1.2rem;
    font-size:0.85rem;
    font-weight:600;
    letter-spacing:0.02em;
    cursor:pointer;
    white-space:nowrap;
    transition: background 0.2s ease;
  }
  button.toggle-btn:hover{
    background:var(--rust);
  }
</style>
</head>
<body>
  <p class="eyebrow">Roadbound Internal</p>
  <h1>Fleet Admin Dashboard</h1>
  <div id="admin-panel"></div>

  <script>
  const cars = ["City Hatch", "Highway Sedan", "Trailhead SUV", "Backroad Pickup", "Coastline Convertible", "Family Minivan", "Volt Electric"];
  const panel = document.getElementById('admin-panel');

  // 1. Fetch data from the server
  async function loadAdminData() {
    const response = await fetch('/api/fleet');
    const fleetData = await response.json();
    renderAdmin(fleetData);
  }

  // 2. Draw the dashboard
  function renderAdmin(fleetData) {
    panel.innerHTML = '';
    cars.forEach(car => {
      const isAvailable = fleetData[car];

      panel.innerHTML += `
        <div class="admin-card">
          <div class="car-info">
            <h3>${car}</h3>
            <span class="status-tag ${isAvailable ? 'available' : 'booked'}">
              ${isAvailable ? 'Available' : 'Booked'}
            </span>
          </div>
          <button class="toggle-btn" onclick="toggleStatus('${car}')">
            Mark ${isAvailable ? 'Unavailable' : 'Available'}
          </button>
        </div>
      `;
    });
  }

  // 3. Send just the car name to your /toggle endpoint
  window.toggleStatus = async function(carName) {
    await fetch('/api/fleet/toggle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ carName: carName }) // The server does the flipping!
    });

    // Refresh the screen
    loadAdminData();
  };

  // Start the dashboard
  loadAdminData();
</script>
</body>
</html>
